name: Fund Flow Daily Fetch

on:
  schedule:
    # ทุกวันจันทร์–ศุกร์ 22:15 UTC (= 5:15 PM ET, หลัง market close 75 นาที)
    - cron: "15 22 * * 1-5"
  workflow_dispatch:
    # กด Run workflow ด้วยมือได้จาก GitHub UI ตลอดเวลา

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ต้องการสิทธิ์ push ไฟล์กลับ repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run fetcher
        run: python fetch.py

      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # commit เฉพาะถ้ามีอะไรเปลี่ยน
          git diff --staged --quiet || git commit -m "data: fund flow update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
